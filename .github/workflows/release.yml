name: Release

on:
  workflow_dispatch:
    inputs:
      build_android_apk:
        description: "Build Android APKs (GitHub release)"
        type: boolean
        default: true
      build_android_aab:
        description: "Build Android AAB (Play Store)"
        type: boolean
        default: true
      build_ios:
        description: "Build iOS IPA (App Store)"
        type: boolean
        default: true
      create_release:
        description: "Create GitHub draft release"
        type: boolean
        default: true

env:
  FLUTTER_VERSION: "3.42.0-0.4.pre"
  FLUTTER_CHANNEL: "beta"

jobs:
  # ─────────────────────────────────────────────
  # Extract version from pubspec.yaml
  # ─────────────────────────────────────────────
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build_number: ${{ steps.get_version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: get_version
        run: |
          FULL_VERSION=$(sed -n 's/^version: \(.*\)/\1/p' frontend/pubspec.yaml | tr -d '[:space:]')
          VERSION=$(echo "$FULL_VERSION" | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$FULL_VERSION" | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

  # ─────────────────────────────────────────────
  # Android APKs (split per ABI for GitHub release)
  # ─────────────────────────────────────────────
  build_android_apk:
    name: Android APKs
    needs: version
    if: ${{ inputs.build_android_apk }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Decode key.properties
        env:
          ENCODED_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ENCODED_KEY_PROPERTIES" ]; then
            echo "$ENCODED_KEY_PROPERTIES" | base64 --decode > frontend/android/key.properties
          else
            echo "WARNING: No ANDROID_KEY_PROPERTIES secret set, using debug signing"
          fi

      - name: Decode keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > frontend/astroseeker.jks
          else
            echo "WARNING: No ANDROID_KEYSTORE secret set, using debug signing"
          fi

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APKs (split per ABI)
        working-directory: frontend
        run: flutter build apk --split-per-abi --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            frontend/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            frontend/build/app/outputs/flutter-apk/app-x86_64-release.apk

  # ─────────────────────────────────────────────
  # Android AAB (for Google Play Store)
  # ─────────────────────────────────────────────
  build_android_aab:
    name: Android AAB (Play Store)
    needs: version
    if: ${{ inputs.build_android_aab }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Decode key.properties
        env:
          ENCODED_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ENCODED_KEY_PROPERTIES" ]; then
            echo "$ENCODED_KEY_PROPERTIES" | base64 --decode > frontend/android/key.properties
          else
            echo "WARNING: No ANDROID_KEY_PROPERTIES secret set, using debug signing"
          fi

      - name: Decode keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > frontend/astroseeker.jks
          else
            echo "WARNING: No ANDROID_KEYSTORE secret set, using debug signing"
          fi

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build AAB
        working-directory: frontend
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab

  # ─────────────────────────────────────────────
  # iOS IPA (for App Store / TestFlight)
  # ─────────────────────────────────────────────
  build_ios:
    name: iOS IPA
    needs: version
    if: ${{ inputs.build_ios }}
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "WARNING: No iOS signing secrets set, building unsigned"
            exit 0
          fi

          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build iOS
        working-directory: frontend
        env:
          HAS_SIGNING: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          if [ "$HAS_SIGNING" = "true" ]; then
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            echo "No signing certificate configured, building unsigned"
            flutter build ios --release --no-codesign
          fi

      - name: Upload IPA (signed)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: frontend/build/ios/ipa/*.ipa
          if-no-files-found: warn

      - name: Upload iOS build (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-unsigned
          path: frontend/build/ios/iphoneos/Runner.app
          if-no-files-found: warn

      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          fi

  # ─────────────────────────────────────────────
  # Create GitHub Draft Release
  # ─────────────────────────────────────────────
  release:
    name: Create Draft Release
    needs: [version, build_android_apk, build_android_aab, build_ios]
    if: |
      always() &&
      inputs.create_release &&
      needs.version.result == 'success' &&
      (needs.build_android_apk.result == 'success' || needs.build_android_apk.result == 'skipped') &&
      (needs.build_android_aab.result == 'success' || needs.build_android_aab.result == 'skipped') &&
      (needs.build_ios.result == 'success' || needs.build_ios.result == 'skipped')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ needs.version.outputs.version }}"

          # Android APKs
          if [ -d "artifacts/android-apks" ]; then
            for apk in artifacts/android-apks/*.apk; do
              if [ -f "$apk" ]; then
                ABI=$(echo "$apk" | sed -n 's/.*app-\(.*\)-release.apk/\1/p')
                cp "$apk" "release-assets/AstroSeeker-${VERSION}-android-${ABI}.apk"
              fi
            done
          fi

          # Android AAB
          if [ -d "artifacts/android-aab" ]; then
            cp artifacts/android-aab/*.aab "release-assets/AstroSeeker-${VERSION}-android.aab" 2>/dev/null || true
          fi

          # iOS IPA
          if [ -d "artifacts/ios-ipa" ]; then
            cp artifacts/ios-ipa/*.ipa "release-assets/AstroSeeker-${VERSION}-ios.ipa" 2>/dev/null || true
          fi

          echo "Release assets:"
          ls -la release-assets/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: AstroSeeker v${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
